#
# Cloud Run Worker Pool - Temporal Workers
# Deploys Temporal workflow/activity workers as a Cloud Run Worker Pool.
# Scaled by CREMA based on task queue backlog depth.
# OTEL Collector sidecar forwards SDK metrics to Google Managed Prometheus.
#
# Deploy with:
#   gcloud run worker-pools replace run-workerpool.yaml --region REGION
#

apiVersion: run.googleapis.com/v1
kind: WorkerPool
metadata:
  name: temporal-worker
  labels:
    cloud.googleapis.com/location: %REGION%
  annotations:
    run.googleapis.com/launch-stage: BETA
spec:
  template:
    metadata:
      labels:
        date_updated: %DATE_UPDATED%
      annotations:
        run.googleapis.com/cpu-throttling: 'false'     # required: workers use long-polling
        run.googleapis.com/container-dependencies: '{"app-worker":["collector"]}'
    spec:
      serviceAccountName: %SERVICE_ACCOUNT_EMAIL%
      containers:
      - image: "%WORKER_APP_IMAGE%"
        name: app-worker
        startupProbe:
          httpGet:
            path: /health
            port: 8081
          initialDelaySeconds: 30
        livenessProbe:
          httpGet:
            path: /health
            port: 8081
        resources:
          limits:
            memory: "2Gi"
            cpu: "4"
        command:
        - "java"
        args:
        - "-Xss256k"
        - "-XX:NativeMemoryTracking=summary"
        - "-XX:+UnlockDiagnosticVMOptions"
        - "-XX:+PrintNMTStatistics"
        - "-XX:+TieredCompilation"
        - "-XX:TieredStopAtLevel=1"
        - "-Djava.security.edg=file:/dev/./urandom"
        - "-Ddebug=true"
        - "-Dspring.profiles.active=tc"
        - "-Dspring.temporal.namespace=%TEMPORAL_NAMESPACE%"
        - "-Dspring.temporal.connection.target=%TEMPORAL_ENDPOINT%"
        - "-Dspring.temporal.connection.mtls.insecure-trust-manager=%TEMPORAL_INSECURE_TRUST_MANAGER%"
        - "-Dspring.temporal.connection.mtls.key-file=/keyvolume/client.key"
        - "-Dspring.temporal.connection.mtls.cert-chain-file=/cavolume/clientCert.pem"
        - "-jar"
        - "app.jar"
        volumeMounts:
        - name: cacert_volume
          readOnly: true
          mountPath: /cavolume
        - name: key_volume
          readOnly: true
          mountPath: /keyvolume
      - image: "%OTELCOL_IMAGE%"
        name: collector
        env:
        - name: CLOUD_RUN_REGION
          value: "%REGION%"
        startupProbe:
          httpGet:
            path: /
            port: 13133
      volumes:
      - name: cacert_volume
        secret:
          secretName: clientCert
          items:
          - key: latest
            path: clientCert.pem
      - name: key_volume
        secret:
          secretName: clientKey
          items:
          - key: latest
            path: client.key
